# Field Validation Test 5 — Comp #1 (1,923 gal) → Comp #2 (3,060 gal)
# Setup: compartment-to-compartment transfer on same tanker
# Hose: 3" ID × 25ft, one female cam-lock coupling (no reducers)
# Compressor: 19 SCFM rated, 70ft small air hose to tank
# Liquid: 22" depth in Comp #1 = 518 gal (from calibration chart)

scenario_name: field_test_5_3inch

# Tank Geometry — Compartment #1 (calibration chart: 1,923 gal, same tanker ~68" dia)
tank_total_volume_gal: 1923
tank_diameter_in: 68.0
tank_length_ft: 0

# Initial Conditions (518 gal from calibration chart at 22" depth)
initial_liquid_volume_gal: 518
initial_tank_pressure_psig: 0.0
gas_temperature_C: 20.0
ambient_pressure_psia: 14.696

# Pressure Limits
max_tank_pressure_psig: 20.0
relief_valve_pressure_psig: 22.0
relief_valve_Cd: 0.62
relief_valve_diameter_in: 1.0

# Air Supply (truck PTO compressor at 9k RPM, 70ft small air hose to tank)
air_supply_scfm: 19.0
compressor_clearance: 0.02

# Liquid Properties (water at ~20C)
liquid_density_kg_m3: 998.0
liquid_viscosity_cP: 1.0
n_power_law: 1.0

# Outlet Valve (3" tank valve)
valve_diameter_in: 3.0
valve_K_open: 0.2
valve_opening_fraction: 1.0

# Pipe Segments (single 3" hose, 25 ft — no reducers needed)
num_pipes: 1
pipe1_diameter_in: 3.0
pipe1_length_ft: 25.0
pipe1_roughness_mm: 0.015    # SS316 smooth-bore (adjust if rubber)
pipe1_K_minor: 1.60    # entry(0.5) + 1x cam-lock(0.10) + exit(1.0)

pipe2_diameter_in: 3.0
pipe2_length_ft: 0.0
pipe2_roughness_mm: 0.01
pipe2_K_minor: 0.0

pipe3_diameter_in: 3.0
pipe3_length_ft: 0.0
pipe3_roughness_mm: 0.01
pipe3_K_minor: 0.0

pipe4_diameter_in: 3.0
pipe4_length_ft: 0.0
pipe4_roughness_mm: 0.01
pipe4_K_minor: 0.0

pipe5_diameter_in: 3.0
pipe5_length_ft: 0.0
pipe5_roughness_mm: 0.01
pipe5_K_minor: 0.0

# Elevation & Receiver (compartment-to-compartment, same height, vented receiver)
elevation_change_ft: 0.0
receiver_pressure_psig: 0.0

# Valve Timing (pre-pressurized to 20 psig before opening valve)
valve_open_time_s: 2760

# Simulation
stop_time_s: 5400
output_interval_s: 1.0
min_liquid_volume_gal: 5
