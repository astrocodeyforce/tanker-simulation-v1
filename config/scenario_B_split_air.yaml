# =============================================================================
# Scenario B: Split Air (Pressurize + Pump)
# =============================================================================
# Air supply is split 50/50 between tank pressurization and AODD pump.
# Both mechanisms contribute to liquid transfer simultaneously.
# =============================================================================

scenario_name: scenario_B_split_air

# --- Core Tank ---
tanker_total_volume_gal: 4500
initial_fill_fraction: 0.90
max_tank_pressure_psig: 30.0
ambient_pressure_psia: 14.7
temperature_C: 25.0

# --- Air Supply ---
air_supply_scfm: 19.0
air_split_fraction_to_tank: 0.5      # Half the air pressurizes the tank
air_split_fraction_to_pump: 0.5      # Half the air drives the AODD pump

# --- Liquid Properties (Motor Oil) ---
density_kg_m3: 880.0
viscosity_cP: 220.0

# --- Hose / Piping ---
hose_ID_in: 2.0
hose_length_ft: 50.0
roughness_mm: 0.0
minor_loss_K_total: 5.0
elevation_change_ft: 0.0

# --- Receiving System ---
receiver_backpressure_psig: 0.0

# --- AODD Pump ---
pump_efficiency_gpm_per_scfm: 0.5    # Simplified: 0.5 GPM output per SCFM air input
# Note: This is a placeholder efficiency. Replace with manufacturer curve data
# when available. With 9.5 SCFM to pump → expect ~4.75 GPM from pump.

# --- Simulation Settings ---
stop_time_s: 7200
output_interval_s: 1.0
