# =============================================================================
# Scenario: High-Viscosity Coating — slow unload, tests pressure limit
# =============================================================================
# Thick coating (500 cP) through smaller 2" pipe.
# Will take longer and pressure will build higher before equilibrium.
# =============================================================================

scenario_name: coating_high_visc

# ─── Tank Geometry ───────────────────────────────────────────────────────────
tank_total_volume_gal: 7000
tank_diameter_in: 75
tank_length_ft: 0

# ─── Initial Conditions ──────────────────────────────────────────────────────
initial_liquid_volume_gal: 6500
initial_tank_pressure_psig: 0.0
gas_temperature_C: 20.0
ambient_pressure_psia: 14.696

# ─── Pressure Limits ─────────────────────────────────────────────────────────
max_tank_pressure_psig: 25.0
relief_valve_pressure_psig: 27.5
relief_valve_Cd: 0.62
relief_valve_diameter_in: 1.0

# ─── Air Supply ──────────────────────────────────────────────────────────────
air_supply_scfm: 19.0

# ─── Liquid Properties (thick coating) ───────────────────────────────────────
liquid_density_kg_m3: 1200.0         # Dense coating
liquid_viscosity_cP: 500.0           # Very thick — always laminar

# ─── Outlet Valve ────────────────────────────────────────────────────────────
valve_diameter_in: 2.0               # Smaller valve
valve_K_open: 0.3
valve_opening_fraction: 1.0

# ─── Discharge Pipe Segment 1 ────────────────────────────────────────────────
pipe1_diameter_in: 2.0               # 2" hose
pipe1_length_ft: 30.0
pipe1_roughness_mm: 0.01
pipe1_K_minor: 2.0

# ─── Discharge Pipe Segment 2 ────────────────────────────────────────────────
pipe2_diameter_in: 2.0               # 2" hose
pipe2_length_ft: 30.0
pipe2_roughness_mm: 0.01
pipe2_K_minor: 1.5

# ─── Elevation & Receiver ────────────────────────────────────────────────────
elevation_change_ft: 3.0             # Lifting 3 feet into receiver
receiver_pressure_psig: 0.0

# ─── Simulation ──────────────────────────────────────────────────────────────
stop_time_s: 10800                   # 3 hours — thick stuff takes long
output_interval_s: 2.0
min_liquid_volume_gal: 10.0
