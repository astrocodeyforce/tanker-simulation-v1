# =============================================================================
# Scenario C: Pump Only
# =============================================================================
# All compressed air drives the AODD pump.
# Tank is NOT pressurized — remains at atmospheric pressure.
# Liquid is moved entirely by the pump.
# =============================================================================

scenario_name: scenario_C_pump_only

# --- Core Tank ---
tanker_total_volume_gal: 4500
initial_fill_fraction: 0.90
max_tank_pressure_psig: 30.0         # Irrelevant since no air enters tank
ambient_pressure_psia: 14.7
temperature_C: 25.0

# --- Air Supply ---
air_supply_scfm: 19.0
air_split_fraction_to_tank: 0.0      # NO air to tank — stays atmospheric
air_split_fraction_to_pump: 1.0      # ALL air drives the pump

# --- Liquid Properties (Motor Oil) ---
density_kg_m3: 880.0
viscosity_cP: 220.0

# --- Hose / Piping ---
hose_ID_in: 2.0
hose_length_ft: 50.0
roughness_mm: 0.0
minor_loss_K_total: 5.0
elevation_change_ft: 0.0

# --- Receiving System ---
receiver_backpressure_psig: 0.0

# --- AODD Pump ---
pump_efficiency_gpm_per_scfm: 0.5    # Simplified: 0.5 GPM per SCFM air input
# With 19 SCFM to pump → expect ~9.5 GPM from pump.
# This is a constant-efficiency placeholder. Real AODD pumps have curves
# that depend on differential pressure and air supply pressure.

# --- Simulation Settings ---
stop_time_s: 7200
output_interval_s: 1.0
