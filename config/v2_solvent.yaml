# =============================================================================
# Scenario: Low-Viscosity Solvent — tests turbulent flow regime
# =============================================================================
# Same tanker, but with a water-like solvent (1 cP).
# Will trigger turbulent flow in 3" pipe — validates friction factor blending.
# =============================================================================

scenario_name: solvent_low_visc

# ─── Tank Geometry ───────────────────────────────────────────────────────────
tank_total_volume_gal: 7000
tank_diameter_in: 75
tank_length_ft: 0

# ─── Initial Conditions ──────────────────────────────────────────────────────
initial_liquid_volume_gal: 6500
initial_tank_pressure_psig: 0.0
gas_temperature_C: 20.0
ambient_pressure_psia: 14.696

# ─── Pressure Limits ─────────────────────────────────────────────────────────
max_tank_pressure_psig: 25.0
relief_valve_pressure_psig: 27.5
relief_valve_Cd: 0.62
relief_valve_diameter_in: 1.0

# ─── Air Supply ──────────────────────────────────────────────────────────────
air_supply_scfm: 19.0

# ─── Liquid Properties (solvent — water-like) ────────────────────────────────
liquid_density_kg_m3: 850.0          # Typical organic solvent
liquid_viscosity_cP: 1.0             # Low viscosity — TURBULENT flow expected

# ─── Outlet Valve ────────────────────────────────────────────────────────────
valve_diameter_in: 3.0
valve_K_open: 0.2
valve_opening_fraction: 1.0

# ─── Discharge Pipe Segment 1 ────────────────────────────────────────────────
pipe1_diameter_in: 3.0
pipe1_length_ft: 25.0
pipe1_roughness_mm: 0.01
pipe1_K_minor: 1.5

# ─── Discharge Pipe Segment 2 ────────────────────────────────────────────────
pipe2_diameter_in: 3.0
pipe2_length_ft: 25.0
pipe2_roughness_mm: 0.01
pipe2_K_minor: 1.0

# ─── Elevation & Receiver ────────────────────────────────────────────────────
elevation_change_ft: 0.0
receiver_pressure_psig: 0.0

# ─── Simulation ──────────────────────────────────────────────────────────────
stop_time_s: 3600
output_interval_s: 1.0
min_liquid_volume_gal: 10.0
